<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bi-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BBE1FA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#BBE1FA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="55" fill="url(#bi-glow)"/>
  <circle cx="60" cy="60" r="48" fill="none" stroke="#0F4C75" stroke-width="2" opacity="0.5"/>
  <g style="transform-origin:60px 60px">
    <circle cx="60" cy="60" r="48" fill="none" stroke="#3282B8" stroke-width="2.5" stroke-dasharray="22 14" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="60" cy="60" r="32" fill="none" stroke="#3282B8" stroke-width="1.5" opacity="0.6"/>
  <g style="transform-origin:60px 60px">
    <circle cx="60" cy="60" r="32" fill="none" stroke="#BBE1FA" stroke-width="2.5" stroke-dasharray="14 10" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="360 60 60" to="0 60 60" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="60" cy="60" r="16" fill="#0F4C75" stroke="#BBE1FA" stroke-width="2"/>
  <circle cx="60" cy="60" r="6" fill="#BBE1FA">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
