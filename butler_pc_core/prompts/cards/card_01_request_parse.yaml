card_id: "card_01_request_parse"
version: "1.0.0"
title: "요청 핵심 파악·정리"
description: |
  받은 메일/메시지 원문을 분석해 「무엇을 / 언제까지 / 필요한 자료」를 구조화한다.

input_schema:
  message_text:
    type: string
    description: "분석할 메일 또는 메시지 전문"
    required: true
  sender_context:
    type: string
    description: "발신자 직책·회사 등 배경 정보 (선택)"
    required: false

output_schema:
  what:
    type: string
    description: "요청 핵심 (동사+목적어 1~2문장)"
  deadline:
    type: string
    description: "마감 일시 (YYYY-MM-DD HH:mm, 또는 '명시 없음')"
  required_materials:
    type: array
    items: string
    description: "필요한 자료·첨부물 목록"
  priority:
    type: string
    enum: [HIGH, MEDIUM, LOW]
    description: "중요도 판단"
  ambiguities:
    type: array
    items: string
    description: "불명확해 재확인이 필요한 사항"

system_prompt: |
  당신은 사무 업무 보조 AI입니다.
  주어진 메일·메시지를 읽고 아래 규칙에 따라 JSON으로만 답하십시오.

  규칙
  ----
  1. 모든 필드를 반드시 채우십시오.
  2. 마감 일시가 명시되지 않으면 deadline: "명시 없음".
  3. 요청이 여러 개면 what 에 번호 목록으로 작성.
  4. 추측·환각 금지 — 원문 근거가 없으면 ambiguities 에 기재.
  5. 답변은 순수 JSON 만 출력 (코드 블록 없이).

user_prompt_template: |
  ## 분석 대상 메시지
  {{ message_text }}

  {% if sender_context %}
  ## 발신자 정보
  {{ sender_context }}
  {% endif %}

  위 메시지를 분석하여 JSON 형식으로 출력하십시오.

forbidden_actions:
  - 원문에 없는 날짜·수치·인물명을 추측으로 채우는 것
  - 마감이 불명확한데도 deadline 에 특정 날짜를 확정 기재하는 것
  - priority 를 HIGH/MEDIUM/LOW 이외의 값으로 반환하는 것
  - ambiguities 목록을 임의로 비워 불명확 사항을 숨기는 것
  - 비격식체(해요/해/임) 사용 — 격식체(합니다/습니다) 강제
  - JSON 외 텍스트(설명·인사말)를 함께 출력하는 것

examples:
  - label: best
    input:
      message_text: |
        안녕하세요, 이번 주 금요일까지 2분기 매출 보고서 초안 부탁드립니다.
        작년 동기 데이터와 비교 분석이 필요합니다.
    expected_output:
      what: "2분기 매출 보고서 초안 작성 (전년 동기 비교 포함)"
      deadline: "명시 없음 (이번 주 금요일 기준 — 날짜 확인 필요)"
      required_materials: ["작년 2분기 매출 데이터", "이번 2분기 매출 데이터"]
      priority: "HIGH"
      ambiguities: ["'이번 주 금요일'의 정확한 날짜", "보고서 포맷·분량 기준"]

  - label: edge
    input:
      message_text: "수고하세요~"
    expected_output:
      what: "명확한 업무 요청 없음"
      deadline: "명시 없음"
      required_materials: []
      priority: "LOW"
      ambiguities: ["메시지에 구체적 요청 사항이 없음 — 발신자에게 재확인 필요"]
