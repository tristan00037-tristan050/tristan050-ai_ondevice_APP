card_id: "card_04_document_review"
version: "1.0.0"
title: "첨부 문서 수정·보완"
description: |
  작성 중인 문서를 검토하여 누락 내용, 오류, 수정 제안을 제공한다.

input_schema:
  draft_document:
    type: string
    description: "검토 대상 문서 초안 (텍스트)"
    required: true
  review_criteria:
    type: array
    items: string
    description: "검토 기준 목록 (예: 논리 흐름, 오탈자, 수치 일관성)"
    required: false
  reference_documents:
    type: array
    items: string
    description: "비교 참고 문서 (예: 기준 규정, 전년도 자료)"
    required: false

output_schema:
  issues:
    type: array
    items:
      type: object
      properties:
        location:
          type: string
          description: "문제 위치 (섹션명 또는 인용 문장)"
        type:
          type: string
          enum: [MISSING, ERROR, INCONSISTENCY, STYLE, SUGGESTION]
        description:
          type: string
        suggested_fix:
          type: string
  overall_score:
    type: integer
    description: "문서 완성도 점수 (0~100)"
  summary:
    type: string
    description: "전체 검토 요약 (3문장 이내)"

system_prompt: |
  당신은 사무 문서 검토 전문 AI입니다.

  규칙
  ----
  1. 각 문제를 location / type / description / suggested_fix 로 구조화하십시오.
  2. type 은 MISSING(누락) / ERROR(오류) / INCONSISTENCY(불일치) / STYLE(어투) / SUGGESTION(제안) 중 하나.
  3. suggested_fix 는 구체적 수정문을 제시하십시오 (원문 인용 후 →수정안).
  4. overall_score : 완성도 0~100 (오류 없음=100, 치명적 누락=-20 씩).
  5. 문제가 없으면 issues: [] 반환.
  6. 환각 금지 — 원문에 없는 내용을 문제로 지적하지 마십시오.

user_prompt_template: |
  ## 검토 대상 문서
  {{ draft_document }}

  {% if review_criteria %}
  ## 검토 기준
  {% for c in review_criteria %}
  - {{ c }}
  {% endfor %}
  {% endif %}

  {% if reference_documents %}
  ## 참고 문서
  {% for r in reference_documents %}
  ### 참고 {{ loop.index }}
  {{ r }}
  {% endfor %}
  {% endif %}

  위 문서를 검토하여 JSON 형식으로 출력하십시오.

forbidden_actions:
  - 원문에 없는 내용을 문제로 지적하는 것 (환각 기반 지적 금지)
  - suggested_fix 없이 description 만 제공하는 것
  - type 열거값(MISSING/ERROR/INCONSISTENCY/STYLE/SUGGESTION) 외 임의 값 사용
  - overall_score 범위(0~100) 이탈 또는 설명 없이 점수만 반환하는 것
  - 비격식체(해요/해/임) 사용 — 격식체(합니다/습니다) 강제
  - 마크다운 코드 블록(```) 밖에서 JSON 외 텍스트를 출력하는 것

examples:
  - label: best
    input:
      draft_document: |
        # 2026년 1분기 업무 보고

        ## 실적 요약
        매출 50억 원 달성 (전년 동기 대비 증가).

        ## 향후 계획
        2분기 목표: 60억 원.
      review_criteria:
        - "수치 일관성"
        - "누락 항목 확인"
    expected_output:
      issues:
        - location: "실적 요약 — '전년 동기 대비 증가'"
          type: MISSING
          description: "증가율 또는 전년 동기 수치가 누락되어 근거를 확인할 수 없습니다."
          suggested_fix: "'전년 동기 대비 X% 증가(전년 동기 XX억 원)'로 수정 권장."
        - location: "향후 계획 — '2분기 목표: 60억 원'"
          type: SUGGESTION
          description: "목표 달성 전략 또는 근거가 없어 설득력이 낮습니다."
          suggested_fix: "목표 달성 전략 1~2줄 추가 권장."
      overall_score: 72
      summary: "기본 구성은 갖추었으나 수치 근거와 향후 전략이 미흡합니다. 두 항목 보완 후 재검토를 권장합니다."

  - label: edge
    input:
      draft_document: |
        보고서입니다.
      review_criteria: []
    expected_output:
      issues:
        - location: "전체 문서"
          type: MISSING
          description: "제목, 작성일, 작성자, 본문 내용이 모두 누락되었습니다."
          suggested_fix: "표준 보고서 양식(제목/일자/작성자/본문/결론)에 따라 재작성 권장."
      overall_score: 10
      summary: "문서 내용이 거의 없어 검토가 불가능합니다. 기본 양식을 갖춰 재제출하십시오."
