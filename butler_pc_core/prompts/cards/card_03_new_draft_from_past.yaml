card_id: "card_03_new_draft_from_past"
version: "1.0.0"
title: "기존 문서 기반 새 초안"
description: |
  우리 과거 자료를 참고하여 새 상황에 맞는 초안을 작성한다.

input_schema:
  past_documents:
    type: array
    items: string
    description: "참고할 과거 문서 목록 (각 항목: 텍스트 추출본)"
    required: true
  new_situation:
    type: string
    description: "새 초안에 반영해야 할 상황·요구사항 설명"
    required: true
  draft_type:
    type: string
    description: "초안 유형 (예: 제안서, 회의록, 공문, 보도자료)"
    required: false
  length_guide:
    type: string
    description: "분량 가이드 (예: A4 1장, 500자 이내)"
    required: false

output_schema:
  draft:
    type: string
    description: "완성된 새 초안 (마크다운)"
  reused_sections:
    type: array
    items: string
    description: "과거 문서에서 그대로/거의 그대로 가져온 섹션 목록"
  changed_sections:
    type: array
    items: string
    description: "새 상황에 맞게 수정된 섹션 목록"
  cautions:
    type: array
    items: string
    description: "담당자가 반드시 검토해야 할 주의 사항"

system_prompt: |
  당신은 문서 초안 작성 전문 사무 보조 AI입니다.

  규칙
  ----
  1. 과거 문서의 구조·어조·용어를 최대한 일관되게 유지하십시오.
  2. 새 상황과 충돌하는 내용은 반드시 수정하십시오.
  3. 날짜·금액·담당자명 등 구체적 수치는 "[확인 필요: XXX]" 플레이스홀더로 처리하십시오.
  4. 환각 금지 — 근거 없는 수치나 인물명 사용 절대 금지.
  5. 격식체(합니다/습니다) 사용.

user_prompt_template: |
  ## 새 상황·요구사항
  {{ new_situation }}

  {% if draft_type %}
  ## 초안 유형
  {{ draft_type }}
  {% endif %}

  {% if length_guide %}
  ## 분량 가이드
  {{ length_guide }}
  {% endif %}

  ## 참고 과거 문서
  {% for doc in past_documents %}
  ### 과거 문서 {{ loop.index }}
  {{ doc }}
  {% endfor %}

  위 정보를 바탕으로 새 초안을 JSON 형식으로 출력하십시오.

forbidden_actions:
  - 과거 문서에 없는 수치·날짜·이름을 임의로 생성하는 것
  - '"[확인 필요: ...]" 플레이스홀더 없이 미확인 정보를 확정 사실로 서술하는 것'
  - 과거 문서 원문을 출처 표시 없이 그대로 복붙하는 것
  - 새 상황과 충돌하는 구 정보(담당자, 날짜, 조건)를 그대로 두는 것
  - 비격식체(해요/해/임) 사용 — 격식체(합니다/습니다) 강제
  - 마크다운 코드 블록(```) 밖에서 JSON 외 텍스트를 출력하는 것

examples:
  - label: best
    input:
      past_documents:
        - |
          2025년 3월 AI 도입 제안서
          제안 배경: 업무 효율화를 위해 AI 자동화 도구 도입 검토
          예산: 5,000만 원 (2025년 상반기)
          담당자: 홍길동 팀장
          결론: 3개 벤더 비교 후 최종 선정 예정
      new_situation: "2026년 하반기 예산으로 동일 목적 제안서 재작성. 담당자 변경(홍길동→김철수)."
      draft_type: "제안서"
    expected_output:
      draft: |
        # 2026년 AI 도입 제안서

        ## 제안 배경
        업무 효율화를 위해 AI 자동화 도구 도입을 검토합니다.

        ## 예산
        [확인 필요: 2026년 하반기 예산]

        ## 담당자
        김철수 팀장

        ## 추진 일정
        [확인 필요: 2026년 하반기 일정]
      reused_sections: ["제안 배경", "추진 방향"]
      changed_sections: ["예산", "담당자", "일정"]
      cautions:
        - "예산 항목은 2026년 확정 수치로 교체 필요"
        - "벤더 목록 재검토 필요"

  - label: edge
    input:
      past_documents:
        - |
          2024년 보도자료
          서울시와 MOU 체결 (2024-05-10)
          참여 인원: 임직원 150명
          향후 계획: 2025년 상반기 2차 협약 예정
      new_situation: "2026년 3차 협약 보도자료 작성. 참여 인원 미확정."
      draft_type: "보도자료"
    expected_output:
      draft: |
        # 서울시와 3차 MOU 체결

        [확인 필요: 체결일]에 서울시와 3차 업무협약(MOU)을 체결하였습니다.
        이번 협약에는 [확인 필요: 참여 인원]명의 임직원이 참석하였습니다.
      reused_sections: ["MOU 체결 배경"]
      changed_sections: ["날짜", "참여 인원", "향후 계획"]
      cautions:
        - "체결일 및 참여 인원 확정 후 플레이스홀더 교체 필수"
