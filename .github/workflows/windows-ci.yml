name: Windows CI — smoke / eval / variance

# ── Windows PR CI speedup (독립 작업) ─────────────────────────────────────────
# 범위: 본 워크플로 + .github/ci/requirements-windows-ci.txt + scripts/ci/windows_cpu_ci_bundle.py
# 목적: pull_request 시 Windows 잡 시간 단축(pip 캐시·번들) + 번들 프로세스 RSS SLO(프로파일별 MB).
# PR: 12 eval, variance 5 runs, CI_RSS_MAX_MB=1540. push(main 등 full 번들): 24 eval, variance 11, CI_RSS_MAX_MB=1544 (bundled baseline).

on:
  push:
    branches: [ "pr/windows-ci-556", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  windows-smoke-eval:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1

    steps:
      - name: Checkout (LFS 포함)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/ci/requirements-windows-ci.txt

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/ci/requirements-windows-ci.txt

      - name: Windows CPU CI bundle (smoke + eval + variance, 단일 프로세스)
        env:
          CI_EVAL_MODE: ${{ github.event_name == 'pull_request' && 'pr_subset' || 'full' }}
          CI_VARIANCE_TOTAL_RUNS: ${{ github.event_name == 'pull_request' && '5' || '11' }}
          CI_RSS_MAX_MB: ${{ github.event_name == 'pull_request' && '1540' || '1544' }}
        run: python scripts/ci/windows_cpu_ci_bundle.py

      - name: 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-results
          path: tmp/

