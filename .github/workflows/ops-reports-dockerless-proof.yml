name: ops-reports-dockerless-proof

on:
  pull_request:
  merge_group:

jobs:
  dockerless-proof:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GIT_LFS_SKIP_SMUDGE: "1"
      CI: "true"
      OUT_ROOT: out
      REPO_GUARD_REPORTS_ROOT: out/ops/reports
      REPO_GUARD_KEYS_ONLY: "1"
      DOCKERLESS_REPORT_ENFORCE: "1"
      DOCKER_HOST: unix:///var/run/does-not-exist.sock
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Confirm docker info fails (hard guard)
        shell: bash
        run: |
          set -euo pipefail
          if command -v docker >/dev/null 2>&1; then
            if docker info >/dev/null 2>&1; then
              echo "ERROR_CODE=DOCKER_INFO_SHOULD_FAIL_BUT_OK"
              exit 1
            fi
          fi
          echo "DOCKERLESS_DOCKER_INFO_FAIL_CONFIRMED_OK=1"

      # perf real pipeline p95 guard requires web_e2e node_modules + Playwright
      - name: Install deps (web_e2e)
        run: npm --prefix webcore_appcore_starter_4_17/scripts/web_e2e ci

      - name: Install Playwright browsers
        run: npx --prefix webcore_appcore_starter_4_17/scripts/web_e2e playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright

      - name: Generate repo guard report (must not hard-fail)
        shell: bash
        env:
          DOCKER_HOST: unix:///var/run/does-not-exist.sock
          REPO_GUARD_KEYS_ONLY: "1"
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright
        run: |
          set -euo pipefail
          bash scripts/ops/gen_repo_guard_report_v1.sh

      - name: Verify dockerless report contract (meta-only)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify/verify_dockerless_report_contract_v1.sh

      - name: Anchor
        shell: bash
        env:
          REPO_GUARD_KEYS_ONLY: "1"
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright
        run: |
          set -euo pipefail
          bash scripts/verify/verify_repo_contracts.sh ; echo "EXIT=$?"
