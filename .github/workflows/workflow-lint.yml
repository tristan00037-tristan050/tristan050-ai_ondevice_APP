name: workflow-lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/ops/**"
      - "scripts/verify/**"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GIT_LFS_SKIP_SMUDGE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Lint workflows
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/verify_workflow_lint.sh
